<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logo Portfolio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Navbar -->
  <header>
    <nav class="navbar">
      <h1 class="logo">YourLogo</h1>

      <ul class="nav-links">
        <li><a href="#home">Home</a></li>
        <li><a href="#portfolio">Portfolio</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- Hero Section -->
  <section class="hero" id="home">
    <h2>Modern Logo Portfolio</h2>
    <p>
      I create minimalist and modern logo designs for brands,
      esports teams, creators and businesses.
    </p>

    <button>View Portfolio</button>
  </section>

  <!-- Portfolio -->
  <section class="portfolio" id="portfolio">
    <h2>Featured Logos</h2>

    <div class="portfolio-grid" id="portfolioGrid"></div>
  </section>

  <!-- About -->
  <section class="about" id="about">
    <h2>About Me</h2>

    <p>
      I am a logo designer focused on clean, professional and modern branding.
      My goal is to create memorable logos that help brands stand out.
    </p>
  </section>

  <!-- Contact -->
  <section class="contact" id="contact">
    <h2>Contact Me</h2>

    <input type="email" placeholder="Your Email" />
    <button id="contactBtn">Send Message</button>
  </section>

  <!-- Footer -->
  <footer>
    <p>© 2026 YourLogo. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
